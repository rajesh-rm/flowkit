# SonarQube project configuration
sonar.projectKey=flowkit
sonar.projectName=flowkit

# Source layout — only measure coverage on production code
sonar.sources=src/data_assets
sonar.tests=tests

# Python version
sonar.python.version=3.11

# Coverage report (generated by pytest-cov before scanning)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions — don't analyze generated files or virtual environments
sonar.exclusions=**/__pycache__/**,.venv/**
